<script>
document.addEventListener("DOMContentLoaded", function() {
    let popunderURL = "https://omg10.com/4/10672967"; // Novo link Monetag
    let lastPopTime = 0;
    let minInterval = 10000; // Tempo mínimo entre popunders (10s)

    function openPopunder() {
        let now = new Date().getTime();
        if (now - lastPopTime >= minInterval) {
            let newWindow = window.open(popunderURL, "_blank");

            if (newWindow) {
                newWindow.blur();
                window.focus();
                lastPopTime = now;
                console.log("Popunder aberto!");
            } else {
                console.log("Popunder bloqueado pelo navegador.");
            }
        } else {
            console.log("Aguardando intervalo mínimo...");
        }
    }

    function triggerPop() {
        openPopunder(); // Popunder abre imediatamente
    }

    document.addEventListener("click", triggerPop);

    document.addEventListener("mouseleave", function(event) {
        if (event.clientY <= 0) {
            triggerPop();
        }
    });

    document.addEventListener("keydown", function(event) {
        if (event.key === "Escape") {
            triggerPop();
        }
    });
});
</script>
<style>
:root {
    /* Cor de segurança caso o site não tenha uma cor definida */
    --cor-primaria: #007bff; 
}

.banner-overlay {
    position: fixed;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    background: rgba(0, 0, 0, 0.85);
    backdrop-filter: blur(5px);
    display: none; /* Controlado pelo JS */
    align-items: center;
    justify-content: center;
    z-index: 1000000; 
    font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
}

.banner-box {
    position: relative;
    background: #ffffff;
    padding: 35px 25px 25px;
    width: 92%;
    max-width: 400px;
    border-radius: 20px;
    text-align: center;
    box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
    animation: popIn 0.5s cubic-bezier(0.26, 0.53, 0.74, 1.48);
}

.banner-box h3 {
    margin-bottom: 20px;
    color: #222;
    font-size: 1.3rem;
    line-height: 1.4;
}

.fechar-canto {
    position: absolute;
    top: 15px;
    right: 15px;
    background: #f0f0f0;
    border: none;
    width: 28px;
    height: 28px;
    border-radius: 50%;
    font-size: 18px;
    cursor: pointer;
    color: #888;
    transition: 0.2s;
}

.fechar-canto:hover {
    background: #e0e0e0;
    color: #000;
}

.banner-options button {
    display: block;
    width: 100%;
    margin-bottom: 12px;
    padding: 15px;
    border: none;
    border-radius: 10px;
    background: var(--cor-primaria);
    color: #fff;
    font-weight: bold;
    font-size: 16px;
    cursor: pointer;
    transition: all 0.3s ease;
}

.banner-options button:hover {
    filter: brightness(1.2);
    transform: scale(1.02);
}

@keyframes popIn {
    0% { opacity: 0; transform: scale(0.8) translateY(30px); }
    100% { opacity: 1; transform: scale(1) translateY(0); }
}
</style>

<div id="banner1" class="banner-overlay">
    <div class="banner-box">
        <button class="fechar-canto" onclick="acaoUsuario(1)">×</button>
        <h3>Como você encontrou nosso site?</h3>
        <div class="banner-options">
            <button onclick="acaoUsuario(1)">Redes Sociais</button>
            <button onclick="acaoUsuario(1)">Google / Busca</button>
            <button onclick="acaoUsuario(1)">Recomendação</button>
        </div>
    </div>
</div>

<div id="banner2" class="banner-overlay">
    <div class="banner-box">
        <button class="fechar-canto" onclick="acaoUsuario(2)">×</button>
        <h3>Você está gostando do conteúdo?</h3>
        <div class="banner-options">
            <button onclick="acaoUsuario(2)">Sim, muito!</button>
            <button onclick="acaoUsuario(2)">Pode melhorar</button>
            <button onclick="acaoUsuario(2)">Ainda explorando</button>
        </div>
    </div>
</div>

<div id="banner3" class="banner-overlay">
    <div class="banner-box">
        <button class="fechar-canto" onclick="acaoUsuario(3)">×</button>
        <h3>Gostaria de ver mais conteúdos assim?</h3>
        <div class="banner-options">
            <button onclick="acaoUsuario(3)">Com certeza!</button>
            <button onclick="acaoUsuario(3)">Talvez</button>
            <button onclick="acaoUsuario(3)">Agora não</button>
        </div>
    </div>
</div>

<script>
document.addEventListener("DOMContentLoaded", function() {
    // Tenta capturar a cor principal do seu site (links ou botões existentes)
    const ref = document.querySelector('a, button:not(.fechar-canto), h1');
    if (ref) {
        const corAtiva = window.getComputedStyle(ref).color;
        if(corAtiva !== 'rgba(0, 0, 0, 0)' && corAtiva !== 'rgb(255, 255, 255)') {
            document.documentElement.style.setProperty('--cor-primaria', corAtiva);
        }
    }

    // DISPARO INICIAL: 10 Segundos
    setTimeout(() => mostrarBanner(1), 10000);
});

function mostrarBanner(n) {
    const b = document.getElementById("banner" + n);
    if(b) b.style.display = "flex";
}

function esconderBanner(n) {
    const b = document.getElementById("banner" + n);
    if(b) b.style.display = "none";
}

function acaoUsuario(atual) {
    esconderBanner(atual);

    // Mantendo os intervalos originais para os próximos
    if (atual === 1) {
        setTimeout(() => mostrarBanner(2), 20000);
    } else if (atual === 2) {
        setTimeout(() => mostrarBanner(3), 40000);
    }
}
</script>



    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Leitura | Só Notícias</title>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@600;700;800&family=Lora:ital,wght@0,400;0,500;1,400&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root { --bg: #fafafa; --text: #0f172a; --primary: #059669; --primary-gradient: linear-gradient(135deg, #059669 0%, #0d9488 100%); --surface: #ffffff; --border: #f1f5f9; --text-meta: #64748b; --radius-md: 14px; --radius-lg: 20px; }
        @media (prefers-color-scheme: dark) { :root { --bg: #0b0f19; --text: #f8fafc; --surface: #151f32; --border: #1e293b; --text-meta: #94a3b8; } }
        
        body { font-family: 'Plus Jakarta Sans', sans-serif; background: var(--bg); color: var(--text); margin: 0; line-height: 1.6; padding-bottom: 100px; }
        .header { position: fixed; top: 0; width: 100%; background: rgba(var(--bg), 0.8); backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px); padding: 16px 25px; border-bottom: 1px solid var(--border); display: flex; justify-content: space-between; align-items: center; z-index: 100; box-sizing: border-box; }
        .back-btn { text-decoration: none; color: var(--text); font-weight: 700; display: flex; align-items: center; gap: 8px; }

        .container { max-width: 740px; margin: 100px auto 0; padding: 20px; }
        .source-label { color: var(--primary); font-weight: 800; text-transform: uppercase; font-size: 0.75rem; letter-spacing: 0.05em; margin-bottom: 18px; display: inline-block; background: rgba(5, 150, 105, 0.1); padding: 6px 14px; border-radius: 8px; }
        
        h1 { font-size: 2.5rem; line-height: 1.2; font-weight: 800; margin-bottom: 35px; letter-spacing: -1.5px; }
        
        /* Player de Áudio - Estilo Canva */
        .audio-player { background: var(--surface); border: 1px solid var(--border); padding: 14px 20px; border-radius: var(--radius-md); display: flex; align-items: center; gap: 12px; margin-bottom: 40px; box-shadow: 0 10px 25px -5px rgba(0,0,0,0.05); }
        .audio-title { font-size: 0.85rem; font-weight: 700; color: var(--text-meta); margin-right: auto; }
        .audio-btn { background: var(--border); border: none; width: 38px; height: 38px; border-radius: 50%; color: var(--text); cursor: pointer; display: flex; align-items: center; justify-content: center; transition: 0.2s; }
        .audio-btn:hover { background: var(--primary); color: white; }
        .audio-btn.main-play { background: var(--primary-gradient); color: white; width: 44px; height: 44px; }

        .main-img { width: 100%; border-radius: var(--radius-lg); margin-bottom: 40px; box-shadow: 0 20px 40px rgba(0,0,0,0.06); }
        .content { font-family: 'Lora', serif; font-size: 1.25rem; line-height: 2; color: var(--text); border-bottom: 1px solid var(--border); padding-bottom: 40px; }
        .content p { margin-bottom: 1.8rem; }
        .content img { width: 100%; border-radius: var(--radius-md); margin: 20px 0; }
        
        .related-section { margin-top: 50px; }

        .related-grid { display: flex; flex-direction: column; gap: 16px; }

        .related-headline { font-size: 0.95rem; font-weight: 700; line-height: 1.35; margin-bottom: 6px; display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden; }
        .related-date { font-size: 0.8rem; color: var(--text-meta); }

        footer { margin-top: 60px; padding: 40px 0; text-align: center; border-top: 1px solid var(--border); font-size: 0.9rem; color: var(--text-meta); }
    </style>
</head>
<body>

<div class="header">
    <a href="index.html" class="back-btn"><i class="fas fa-arrow-left"></i> Voltar</a>
    <i class="fas fa-share-alt" style="cursor:pointer" onclick="share()"></i>
</div>

<main class="container">
    <div id="source-tag" class="source-label">...</div>
    <h1 id="title">...</h1>
    
    <!-- Player de Áudio Simplificado -->
    <div class="audio-player">
        <div class="audio-title"><i class="fas fa-volume-up"></i> Ouvir matéria</div>
        <button class="audio-btn main-play" onclick="speakText()" title="Ouvir"><i class="fas fa-play"></i></button>
        <button class="audio-btn" onclick="pauseText()" title="Pausar"><i class="fas fa-pause"></i></button>
        <button class="audio-btn" onclick="resumeText()" title="Continuar"><i class="fas fa-forward"></i></button>
    </div>

    <img id="feat-img" class="main-img" style="display:none">
    <div id="content" class="content"></div>

    <section class="related-section">
        <h2 class="related-title"><i class="fas fa-layer-group" style="color:var(--primary)"></i> Notícias Relacionadas</h2>
        <div class="related-grid" id="related-container"></div>
    </section>

    <footer><p>Só Notícias | Premium</p></footer>
</main>

<script>
    const APIS = { 
        'opais': 'https://opais.co.mz/wp-json/wp/v2/posts/', 'carta': 'https://cartamz.com/wp-json/wp/v2/posts/', 
        'mznews': 'https://mznews.co.mz/wp-json/wp/v2/posts/', 'folha': 'https://www.folhademaputo.co.mz/wp-json/wp/v2/posts/',
        'evidencias': 'https://evidencias.co.mz/wp-json/wp/v2/posts/', 'integrity': 'https://integritymag.co.mz/wp-json/wp/v2/posts/',
        'mais': 'https://mais.co.mz/wp-json/wp/v2/posts/', 'lance': 'https://lancemz.co.mz/wp-json/wp/v2/posts/',
        'desafio': 'https://jornaldesafio.co.mz/wp-json/wp/v2/posts/', 'abola': 'https://www.abola.pt/wp-json/wp/v2/posts/',
        'portalmoz': 'https://portalmoznews.com/wp-json/wp/v2/posts/', 'sapo': 'https://www.sapo.pt/wp-json/wp/v2/posts/'
    };
    let synth = window.speechSynthesis, utterance = null;

    function timeAgo(dateString) {
        const elapsed = new Date() - new Date(dateString);
        const mins = Math.round(elapsed / 60000);
        if (mins < 60) return `Há ${mins}min atrás`;
        if (mins < 1440) return `Há ${Math.round(mins/60)}h atrás`;
        return new Date(dateString).toLocaleDateString('pt-MZ');
    }

    async function loadArticle() {
        const urlParams = new URLSearchParams(window.location.search);
        const src = urlParams.get('src'), id = urlParams.get('id');
        
        try {
            const res = await fetch(`${APIS[src]}${id}?_embed`);
            const p = await res.json();
            
            document.getElementById('source-tag').innerText = src.toUpperCase();
            document.getElementById('title').innerHTML = p.title.rendered;
            document.getElementById('content').innerHTML = p.content.rendered;
            
            const imgUrl = p._embedded?.['wp:featuredmedia']?.[0]?.source_url;
            if(imgUrl) { const img = document.getElementById('feat-img'); img.src = imgUrl; img.style.display = 'block'; }
            loadRelatedNews(src, id);
        } catch(e) { document.getElementById('title').innerText = "Erro ao carregar."; }
    }

    function speakText() {
        synth.cancel();
        const textToRead = document.getElementById('title').innerText + ". " + document.getElementById('content').innerText;
        utterance = new SpeechSynthesisUtterance(textToRead);
        utterance.lang = 'pt-PT'; 
        synth.speak(utterance);
    }
    function pauseText() { if (synth.speaking && !synth.paused) synth.pause(); }
    function resumeText() { if (synth.paused) synth.resume(); }

    async function loadRelatedNews(src, currentId) {
        const container = document.getElementById('related-container');
        try {
            const res = await fetch(`${APIS[src]}?_embed&per_page=6`);
            const posts = await res.json();
            container.innerHTML = '';
            let count = 0;
            posts.forEach(p => {
                if(p.id == currentId || count >= 5) return;
                const img = p._embedded?.['wp:featuredmedia']?.[0]?.source_url || 'https://via.placeholder.com/150?text=Premium';
                const card = document.createElement('a');
                card.className = 'related-card';
                card.href = `artigo.html?id=${p.id}&src=${src}`;
                card.innerHTML = `
                    <img class="related-img" src="${img}">
                    <div class="related-info">
                        <div class="related-headline">${p.title.rendered}</div>
                        <div class="related-date"><i class="far fa-clock"></i> ${timeAgo(p.date)}</div>
                    </div>`;
                container.appendChild(card);
                count++;
            });
        } catch(e) { container.innerHTML = '<div>Sem recomendações.</div>'; }
    }

    function share() { navigator.share({ title: document.getElementById('title').innerText, url: location.href }); }
    window.onbeforeunload = () => synth.cancel();
    window.onload = loadArticle;
</script>
</body>
