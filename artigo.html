<!DOCTYPE html>
<html lang="pt-MZ">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Leitura | Só Notícias</title>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@600;700;800&family=Lora:ital,wght@0,400;0,500;1,400&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root { --bg: #fdfdfc; --text: #111827; --primary: #047857; --surface: #f3f4f6; --border: #e5e7eb; --text-meta: #6b7280; --card: #ffffff; --radius-md: 12px; }
        @media (prefers-color-scheme: dark) { :root { --bg: #0f172a; --text: #f3f4f6; --surface: #1e293b; --border: #334155; --text-meta: #9ca3af; --card: #1e293b; } }
        
        body { font-family: 'Plus Jakarta Sans', sans-serif; background: var(--bg); color: var(--text); margin: 0; line-height: 1.6; }
        .header { position: fixed; top: 0; width: 100%; background: rgba(var(--bg), 0.9); backdrop-filter: blur(12px); -webkit-backdrop-filter: blur(12px); padding: 15px 25px; border-bottom: 1px solid var(--border); display: flex; justify-content: space-between; align-items: center; z-index: 100; box-sizing: border-box; }
        .back-btn { text-decoration: none; color: var(--text); font-weight: 700; display: flex; align-items: center; gap: 8px; }

        .container { max-width: 740px; margin: 100px auto 0; padding: 20px; }
        .source-label { color: var(--primary); font-weight: 800; text-transform: uppercase; font-size: 0.8rem; letter-spacing: 0.1em; margin-bottom: 15px; display: inline-block; background: rgba(4, 120, 87, 0.1); padding: 5px 12px; border-radius: 6px; }
        
        h1 { font-size: 2.4rem; line-height: 1.15; font-weight: 800; margin-bottom: 25px; letter-spacing: -1.5px; }
        .btn-save { border: 1px solid var(--border); padding: 12px 24px; border-radius: 100px; font-weight: 700; cursor: pointer; background: var(--bg); color: var(--text); font-family: inherit; transition: 0.2s; margin-bottom: 40px; }
        .btn-save.active { background: #facc15; color: #000; border-color: #facc15; }

        .main-img { width: 100%; border-radius: 16px; margin-bottom: 40px; box-shadow: 0 10px 30px rgba(0,0,0,0.1); }
        .content { font-family: 'Lora', serif; font-size: 1.3rem; line-height: 1.95; color: var(--text); border-bottom: 1px solid var(--border); padding-bottom: 40px; }
        .content p { margin-bottom: 1.8rem; }
        .content img { width: 100%; border-radius: 12px; margin: 20px 0; }
        
        /* Seção de Notícias Relacionadas */
        .related-section { margin-top: 50px; }
        .related-title { font-size: 1.5rem; font-weight: 800; margin-bottom: 25px; letter-spacing: -0.5px; display: flex; align-items: center; gap: 10px; }
        .related-title i { color: var(--primary); }
        .related-grid { display: flex; flex-direction: column; gap: 16px; }
        .related-card { display: flex; gap: 16px; background: var(--card); border: 1px solid var(--border); padding: 12px; border-radius: var(--radius-md); text-decoration: none; color: inherit; transition: 0.2s; }
        .related-card:hover { border-color: var(--primary); transform: translateX(4px); }
        .related-img { width: 100px; height: 75px; object-fit: cover; border-radius: 8px; background: #eee; flex-shrink: 0; }
        .related-info { display: flex; flex-direction: column; justify-content: center; }
        .related-headline { font-size: 0.95rem; font-weight: 700; line-height: 1.3; margin-bottom: 6px; display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden; }
        .related-date { font-size: 0.8rem; color: var(--text-meta); }

        footer { margin-top: 60px; padding: 40px 0; text-align: center; border-top: 1px solid var(--border); font-size: 0.9rem; color: var(--text-meta); }
    </style>
</head>
<body>

<div class="header">
    <a href="index.html" class="back-btn"><i class="fas fa-arrow-left"></i> Voltar</a>
    <i class="fas fa-share-alt" style="cursor:pointer" onclick="share()"></i>
</div>

<main class="container">
    <div id="source-tag" class="source-label">...</div>
    <h1 id="title">...</h1>
    
    <button id="saveBtn" class="btn-save" onclick="toggleSave()"><i class="far fa-bookmark"></i> Guardar para ler depois</button>

    <img id="feat-img" class="main-img" style="display:none">
    <div id="content" class="content"></div>

    <section class="related-section">
        <h2 class="related-title"><i class="text-primary fas fa-layer-group"></i> Notícias Relacionadas</h2>
        <div class="related-grid" id="related-container">
            <div style="color: var(--text-meta); font-size: 0.9rem;"><i class="fas fa-circle-notch fa-spin"></i> Buscando conteúdos adicionais...</div>
        </div>
    </section>

    <footer>
        <p>Só Notícias | Moçambique Atualizado</p>
    </footer>
</main>

<script>
    const APIS = { 
        'opais': 'https://opais.co.mz/wp-json/wp/v2/posts/', 
        'carta': 'https://cartamz.com/wp-json/wp/v2/posts/', 
        'mznews': 'https://mznews.co.mz/wp-json/wp/v2/posts/',
        'folha': 'https://www.folhademaputo.co.mz/wp-json/wp/v2/posts/',
        'evidencias': 'https://evidencias.co.mz/wp-json/wp/v2/posts/',
        'integrity': 'https://integritymag.co.mz/wp-json/wp/v2/posts/',
        'mais': 'https://mais.co.mz/wp-json/wp/v2/posts/'
    };
    let currentPost = null;

    async function loadArticle() {
        const urlParams = new URLSearchParams(window.location.search);
        const src = urlParams.get('src'), id = urlParams.get('id');
        
        try {
            const res = await fetch(`${APIS[src]}${id}?_embed`);
            const p = await res.json();
            
            currentPost = { id: p.id, title: p.title.rendered, srcSlug: src, link: location.href };

            document.getElementById('source-tag').innerText = src.toUpperCase();
            document.getElementById('title').innerHTML = p.title.rendered;
            document.getElementById('content').innerHTML = p.content.rendered;
            
            const imgUrl = p._embedded?.['wp:featuredmedia']?.[0]?.source_url;
            if(imgUrl) {
                const img = document.getElementById('feat-img');
                img.src = imgUrl;
                img.style.display = 'block';
            }
            updateSaveBtn();
            
            // Dispara a busca de notícias recomendadas da mesma API
            loadRelatedNews(src, id);

        } catch(e) { 
            document.getElementById('title').innerText = "Erro ao carregar conteúdo."; 
        }
    }

    async function loadRelatedNews(src, currentId) {
        const container = document.getElementById('related-container');
        try {
            // Requisita 6 posts para garantir 5 caso o atual esteja na lista
            const res = await fetch(`${APIS[src]}?_embed&per_page=6`);
            const posts = await res.json();
            
            container.innerHTML = '';
            let count = 0;

            posts.forEach(p => {
                if(p.id == currentId || count >= 5) return; // ignora o post aberto atualmente
                
                const img = p._embedded?.['wp:featuredmedia']?.[0]?.source_url || 'https://via.placeholder.com/150?text=Sem+Foto';
                const card = document.createElement('a');
                card.className = 'related-card';
                card.href = `artigo.html?id=${p.id}&src=${src}`;
                card.innerHTML = `
                    <img class="related-img" src="${img}" loading="lazy">
                    <div class="related-info">
                        <div class="related-headline">${p.title.rendered}</div>
                        <div class="related-date">${new Date(p.date).toLocaleDateString()}</div>
                    </div>
                `;
                container.appendChild(card);
                count++;
            });

            if (count === 0) container.innerHTML = '<div style="color:var(--text-meta)">Nenhuma notícia relacionada encontrada.</div>';
        } catch(e) {
            container.innerHTML = '<div style="color:var(--text-meta)">Não foi possível carregar as notícias relacionadas.</div>';
        }
    }

    function toggleSave() {
        let saved = JSON.parse(localStorage.getItem('cld_saved') || '[]');
        const idx = saved.findIndex(x => x.id === currentPost.id);
        idx > -1 ? saved.splice(idx, 1) : saved.push(currentPost);
        localStorage.setItem('cld_saved', JSON.stringify(saved));
        updateSaveBtn();
    }

    function updateSaveBtn() {
        const saved = JSON.parse(localStorage.getItem('cld_saved') || '[]');
        const isSaved = saved.some(x => x.id === currentPost.id);
        const btn = document.getElementById('saveBtn');
        btn.classList.toggle('active', isSaved);
        btn.innerHTML = isSaved ? '<i class="fas fa-bookmark"></i> Guardada' : '<i class="far fa-bookmark"></i> Guardar para ler depois';
    }

    function share() { navigator.share({ title: currentPost.title, url: location.href }); }
    window.onload = loadArticle;
</script>
</body>
</html>
