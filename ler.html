<!DOCTYPE html>
<html lang="pt-MZ">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>A ler notícia - InformaMZ</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
</head>
<body class="bg-gray-50 text-gray-900 font-sans">

    <header class="bg-red-700 text-white shadow-md sticky top-0 z-50">
        <div class="max-w-6xl mx-auto px-4 py-4 flex justify-between items-center">
            <h1 class="text-2xl font-bold tracking-tight cursor-pointer" onclick="window.location.href='index.html'">
                Informa<span class="text-yellow-400">MZ</span>
            </h1>
        </div>
    </header>

    <main class="max-w-6xl mx-auto px-4 py-6">
        <a href="index.html" class="mb-6 inline-flex items-center gap-2 text-red-700 hover:text-red-900 font-medium transition">
            <i data-lucide="arrow-left" class="w-4 h-4"></i> Voltar para o Feed Principal
        </a>

        <div class="grid grid-cols-1 lg:grid-cols-3 gap-8">
            <article class="lg:col-span-2 bg-white p-6 rounded-lg shadow-sm border border-gray-100">
                <div class="flex items-center gap-3 text-xs text-gray-500 mb-3">
                    <span id="artigo-fonte" class="bg-red-100 text-red-800 font-semibold px-2 py-0.5 rounded">-</span>
                    <span id="artigo-data">-</span>
                </div>
                
                <h1 id="artigo-titulo" class="text-2xl sm:text-3xl font-bold mb-4 leading-tight">A carregar conteúdo...</h1>
                
                <div class="flex gap-2 mb-6">
                    <button onclick="partilharNoticiaLink()" class="flex items-center gap-2 bg-gray-100 hover:bg-gray-200 text-sm font-medium px-4 py-2 rounded-lg transition text-gray-700">
                        <i data-lucide="share-2" class="w-4 h-4"></i> Partilhar notícia via Link
                    </button>
                    <span id="aviso-copiado" class="text-xs text-green-600 self-center hidden font-medium">Link copiado!</span>
                </div>

                <div id="artigo-conteudo" class="text-gray-700 leading-relaxed space-y-4 text-lg">
                    </div>
                
                <div class="mt-8 pt-6 border-t border-gray-100">
                    <a id="artigo-link-original" href="#" target="_blank" class="inline-block bg-red-700 hover:bg-red-800 text-white font-medium px-6 py-2.5 rounded-lg transition">
                        Ler artigo original na íntegra
                    </a>
                </div>
            </article>

            <aside class="bg-white p-6 rounded-lg shadow-sm border border-gray-100 h-fit">
                <h3 class="text-lg font-bold mb-4 pb-2 border-b border-gray-200 flex items-center gap-2">
                    <i data-lucide="layers"></i> Notícias Relacionadas
                </h3>
                <div id="lista-relacionadas" class="space-y-4">
                    </div>
            </aside>
        </div>
    </main>

    <script src="app.js"></script>
    <script>
        document.addEventListener("DOMContentLoaded", async () => {
            await carregarDadosNoticias();
            renderizarPaginaLeitura();
            lucide.createIcons();
        });
    </script>
</body>
</html>
