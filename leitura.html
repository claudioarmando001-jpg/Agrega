<!DOCTYPE html>
<html lang="pt-MZ">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Só Notícias - Leitura</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

    <style>
        :root { --primary: #0f172a; --accent: #0284c7; --bg: #f1f5f9; --card: #ffffff; --text: #0f172a; --text-meta: #64748b; --border: #e2e8f0; --radius: 20px; }
        body.dark-mode { --bg: #020617; --card: #1e293b; --text: #f8fafc; --text-meta: #94a3b8; --border: #334155; --accent: #38bdf8; }
        * { box-sizing: border-box; margin: 0; padding: 0; outline: none; }
        body { font-family: 'Plus Jakarta Sans', sans-serif; background: var(--bg); color: var(--text); padding-bottom: 40px; }
        
        .header-read { position: sticky; top: 0; background: var(--card); padding: 12px 16px; border-bottom: 1px solid var(--border); display: flex; justify-content: space-between; align-items: center; z-index: 1000; }
        .logo-main { font-weight: 800; font-size: 1rem; color: var(--accent); letter-spacing: -0.5px; }
        .article-content { padding: 20px; max-width: 800px; margin: 0 auto; }
        .article-img { width: 100%; border-radius: 20px; margin: 15px 0; object-fit: cover; max-height: 450px; }
        
        .action-bar { display: flex; gap: 10px; margin: 15px 0 25px 0; align-items: center; }
        .btn-action { display: inline-flex; align-items: center; gap: 8px; background: var(--card); border: 1px solid var(--border); color: var(--text); padding: 10px 20px; border-radius: 100px; font-size: 0.85rem; font-weight: 700; cursor: pointer; transition: all 0.2s; }
        .btn-action.active { background: #facc15; color: #000; border-color: #facc15; }

        .wp-content { line-height: 1.75; font-size: 1.05rem; }
        .wp-content p { margin-bottom: 18px; }
        .wp-content img { width: 100%; border-radius: 12px; margin: 15px 0; }
        
        .source-tag { font-size: 0.7rem; font-weight: 800; padding: 4px 10px; border-radius: 6px; color: white; text-transform: uppercase; width: fit-content; margin-bottom: 10px; }
        .loading-screen { text-align: center; padding: 50px; font-size: 1.1rem; color: var(--text-meta); }
    </style>
</head>
<body>

<header class="header-read">
    <div style="display:flex; align-items:center; gap:15px">
        <a href="index.html" style="color:inherit; text-decoration:none;"><i class="fas fa-arrow-left" style="font-size: 1.2rem;"></i></a>
        <div class="logo-main">SÓ NOTÍCIAS</div>
    </div>
    <i class="fas fa-moon" id="theme-icon" onclick="toggleTheme()" style="cursor:pointer"></i>
</header>

<main class="article-content">
    <div id="loading" class="loading-screen"><i class="fas fa-circle-notch fa-spin"></i> Abrindo artigo...</div>
    
    <div id="article-view" style="display: none;">
        <div id="source-label" class="source-tag">...</div>
        <h1 id="title" style="font-size: 1.6rem; line-height: 1.3; margin-bottom: 10px;">...</h1>
        
        <div class="action-bar">
            <button id="saveBtn" class="btn-action" onclick="toggleSave()">
                <i class="far fa-bookmark"></i> Guardar para ler depois
            </button>
            <button class="btn-action" onclick="share()">
                <i class="fas fa-share-alt"></i> Compartilhar
            </button>
        </div>

        <img id="feat-img" class="article-img" style="display:none">
        <div id="content" class="wp-content"></div>
    </div>
</main>

<script>
    const APIS = { 
        'opais': 'https://opais.co.mz/wp-json/wp/v2/posts/', 
        'carta': 'https://cartamz.com/wp-json/wp/v2/posts/', 
        'mznews': 'https://mznews.co.mz/wp-json/wp/v2/posts/',
        'folha': 'https://www.folhademaputo.co.mz/wp-json/wp/v2/posts/',
        'evidencias': 'https://evidencias.co.mz/wp-json/wp/v2/posts/',
        'integrity': 'https://integritymag.co.mz/wp-json/wp/v2/posts/',
        'mais': 'https://mais.co.mz/wp-json/wp/v2/posts/'
    };
    
    const PROXY = "https://api.allorigins.win/get?url=";
    let currentPost = null;

    window.onload = () => {
        if(localStorage.getItem('dark') === 'true') toggleTheme(true);
        loadArticle();
    };

    function toggleTheme(init = false) {
        if(!init) document.body.classList.toggle('dark-mode');
        else document.body.classList.add('dark-mode');
        const isDark = document.body.classList.contains('dark-mode');
        localStorage.setItem('dark', isDark);
        document.getElementById('theme-icon').className = isDark ? 'fas fa-sun' : 'fas fa-moon';
    }

    function safeAtob(str) {
        return decodeURIComponent(atob(str).split('').map(c => '%' + ('00' + c.charCodeAt(0).toString(16)).slice(-2)).join(''));
    }

    async function loadArticle() {
        const urlParams = new URLSearchParams(window.location.search);
        const feedId = urlParams.get('feed');
        
        if(!feedId) {
            document.getElementById('loading').innerText = "Link Inválido.";
            return;
        }

        try {
            const decrypted = JSON.parse(safeAtob(feedId));
            const targetUrl = `${APIS[decrypted.slug]}${decrypted.id}?_embed`;

            const res = await fetch(PROXY + encodeURIComponent(targetUrl));
            if(res.ok) {
                const raw = await res.json();
                const p = JSON.parse(raw.contents);

                currentPost = { 
                    id: p.id, 
                    title: p.title?.rendered, 
                    srcSlug: decrypted.slug, 
                    srcName: decrypted.slug.toUpperCase(),
                    img: p._embedded?.['wp:featuredmedia']?.[0]?.source_url || '',
                    link: window.location.href,
                    date: p.date
                };

                document.getElementById('loading').style.display = 'none';
                document.getElementById('article-view').style.display = 'block';

                document.getElementById('source-label').innerText = currentPost.srcName;
                document.getElementById('title').innerHTML = p.title.rendered;
                document.getElementById('content').innerHTML = p.content.rendered;
                
                if(currentPost.img) {
                    const img = document.getElementById('feat-img');
                    img.src = currentPost.img;
                    img.style.display = 'block';
                }
                updateSaveBtn();
            }
        } catch(e) { 
            document.getElementById('loading').innerText = "Erro ao carregar conteúdo."; 
        }
    }

    function toggleSave() {
        if(!currentPost) return;
        let saved = JSON.parse(localStorage.getItem('cld_saved') || '[]');
        const idx = saved.findIndex(x => x.id === currentPost.id && x.srcSlug === currentPost.srcSlug);
        idx > -1 ? saved.splice(idx, 1) : saved.push(currentPost);
        localStorage.setItem('cld_saved', JSON.stringify(saved));
        updateSaveBtn();
    }

    function updateSaveBtn() {
        if(!currentPost) return;
        const saved = JSON.parse(localStorage.getItem('cld_saved') || '[]');
        const isSaved = saved.some(x => x.id === currentPost.id && x.srcSlug === currentPost.srcSlug);
        const btn = document.getElementById('saveBtn');
        btn.classList.toggle('active', isSaved);
        btn.innerHTML = isSaved ? '<i class="fas fa-bookmark"></i> Guardada' : '<i class="far fa-bookmark"></i> Guardar para ler depois';
    }

    function share() { 
        if(currentPost && navigator.share) {
            navigator.share({ title: currentPost.title, url: window.location.href }); 
        }
    }
</script>
</body>
</html>
