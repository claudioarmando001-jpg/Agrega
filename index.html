<!DOCTYPE html>
<html lang="pt-MZ">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>CLD News | Moçambique</title>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root {
            --primary: #047857;
            --primary-dark: #065f46;
            --bg: #fdfdfc;
            --card: #ffffff;
            --text: #111827;
            --text-meta: #6b7280;
            --border: #e5e7eb;
            --radius-lg: 16px;
            --radius-md: 12px;
            --shadow-sm: 0 1px 2px 0 rgba(0, 0, 0, 0.05);
        }
        @media (prefers-color-scheme: dark) {
            :root {
                --bg: #0f172a;
                --card: #1e293b;
                --text: #f3f4f6;
                --text-meta: #9ca3af;
                --border: #334155;
            }
        }
        * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
        body { font-family: 'Plus Jakarta Sans', sans-serif; background: var(--bg); color: var(--text); padding-bottom: 40px; }
        
        .navbar { position: sticky; top: 0; background: rgba(var(--bg), 0.85); backdrop-filter: blur(15px); -webkit-backdrop-filter: blur(15px); z-index: 1000; padding: 14px 20px; border-bottom: 1px solid var(--border); }
        .nav-top { display: flex; justify-content: space-between; align-items: center; max-width: 1200px; margin: 0 auto; }
        .logo { font-weight: 800; font-size: 1.6rem; color: var(--text); text-decoration: none; letter-spacing: -1.5px; display: flex; align-items: center; gap: 8px; }
        .logo span { color: var(--primary); }
        
        .btn-saved { background: var(--card); border: 1px solid var(--border); color: var(--text); padding: 8px 16px; border-radius: var(--radius-md); font-weight: 600; font-size: 0.85rem; cursor: pointer; display: flex; align-items: center; gap: 8px; transition: 0.2s; }
        .btn-saved.active { background: var(--primary); color: white; border-color: var(--primary); }

        .search-bar { margin: 16px auto; max-width: 800px; position: relative; }
        .search-bar input { width: 100%; padding: 14px 18px 14px 48px; border-radius: var(--radius-md); border: 1px solid var(--border); background: var(--card); color: var(--text); font-family: inherit; box-shadow: var(--shadow-sm); }
        .search-bar i { position: absolute; left: 18px; top: 50%; transform: translateY(-50%); color: var(--text-meta); }

        .categories { display: flex; gap: 10px; overflow-x: auto; padding: 10px 0; scrollbar-width: none; max-width: 1200px; margin: 0 auto; }
        .categories::-webkit-scrollbar { display: none; }
        .cat-item { padding: 10px 20px; background: var(--card); border: 1px solid var(--border); border-radius: 100px; font-size: 0.85rem; font-weight: 700; color: var(--text); white-space: nowrap; cursor: pointer; transition: 0.2s; }
        .cat-item.active { background: var(--text); color: var(--bg); border-color: var(--text); }

        .feed { padding: 20px; max-width: 1200px; margin: 0 auto; display: grid; grid-template-columns: repeat(auto-fill, minmax(320px, 1fr)); gap: 25px; }
        .news-card { display: flex; flex-direction: column; background: var(--card); border-radius: var(--radius-lg); border: 1px solid var(--border); text-decoration: none; color: inherit; overflow: hidden; transition: 0.3s; box-shadow: var(--shadow-sm); }
        .news-card:hover { transform: translateY(-5px); box-shadow: 0 10px 15px -3px rgba(0,0,0,0.1); }
        .news-img { width: 100%; height: 200px; object-fit: cover; background: #eee; }
        .news-body { padding: 20px; flex-grow: 1; display: flex; flex-direction: column; }
        .news-tag { font-size: 0.75rem; font-weight: 800; color: var(--primary); text-transform: uppercase; margin-bottom: 10px; }
        .news-title { font-size: 1.1rem; font-weight: 700; line-height: 1.4; margin-bottom: 15px; display: -webkit-box; -webkit-line-clamp: 3; -webkit-box-orient: vertical; overflow: hidden; }
        .news-meta { font-size: 0.8rem; color: var(--text-meta); margin-top: auto; }

        .loader { text-align: center; padding: 50px; grid-column: 1/-1; color: var(--primary); font-size: 1.8rem; }
    </style>
</head>
<body>

<nav class="navbar">
    <div class="nav-top">
        <a href="index.html" class="logo">CLD<span>News</span></a>
        <button id="bookmark-btn" class="btn-saved" onclick="toggleSavedView()"><i class="far fa-bookmark"></i> Salvos</button>
    </div>
    <div class="search-bar">
        <i class="fas fa-search"></i>
        <input type="text" id="search-input" placeholder="Pesquisar em todos os jornais..." onkeyup="if(event.key==='Enter') resetAndLoad()">
    </div>
    <div class="categories">
        <div class="cat-item active" onclick="filterCat('', this)">Recentíssimas</div>
        <div class="cat-item" onclick="filterCat('política', this)">Política</div>
        <div class="cat-item" onclick="filterCat('economia', this)">Economia</div>
        <div class="cat-item" onclick="filterCat('sociedade', this)">Sociedade</div>
        <div class="cat-item" onclick="filterCat('desporto', this)">Desporto</div>
    </div>
</nav>

<main class="feed" id="feed"></main>
<div id="scroll-anchor" class="loader"><i class="fas fa-circle-notch fa-spin"></i></div>

<script>
const SOURCES = [
    { name: "O País", api: "https://opais.co.mz/wp-json/wp/v2/posts?_embed", slug: "opais" },
    { name: "Carta de MZ", api: "https://cartamz.com/wp-json/wp/v2/posts?_embed", slug: "carta" },
    { name: "MZ News", api: "https://mznews.co.mz/wp-json/wp/v2/posts?_embed", slug: "mznews" },
    { name: "Folha de Maputo", api: "https://www.folhademaputo.co.mz/wp-json/wp/v2/posts?_embed", slug: "folha" },
    { name: "Evidências", api: "https://evidencias.co.mz/wp-json/wp/v2/posts?_embed", slug: "evidencias" },
    { name: "Integrity", api: "https://integritymag.co.mz/wp-json/wp/v2/posts?_embed", slug: "integrity" },
    { name: "Mais de MZ", api: "https://mais.co.mz/wp-json/wp/v2/posts?_embed", slug: "mais" }
];

const PROXY = "https://api.allorigins.win/get?url=";
const FALLBACK_IMG = "https://via.placeholder.com/400x250?text=CLD+News";

let allPosts = [], displayedPosts = [], currentPage = 1, itemsPerPage = 6;
let isFetching = false, currentCat = '', isSavedView = false;

function safeBtoa(str) {
    return btoa(encodeURIComponent(str).replace(/%([0-9A-F]{2})/g, (match, p1) => String.fromCharCode('0x' + p1)));
}

async function loadNews() {
    if (isFetching || isSavedView) return;
    isFetching = true;
    document.getElementById('scroll-anchor').style.display = 'block';

    const searchVal = document.getElementById('search-input').value;
    const query = currentCat || searchVal;

    // Dispara requisições assíncronas paralelas
    SOURCES.forEach(async (src) => {
        try {
            let baseUrl = `${src.api}&per_page=6&page=${currentPage}`;
            if (query) baseUrl += `&search=${encodeURIComponent(query)}`;
            
            const res = await fetch(PROXY + encodeURIComponent(baseUrl));
            if (res.ok) {
                const rawData = await res.json();
                const data = JSON.parse(rawData.contents);
                
                if(!Array.isArray(data)) return;

                const newPosts = data.map(p => {
                    // Codificação universal do payload para leitura em qualquer dispositivo
                    const payload = JSON.stringify({ slug: src.slug, id: p.id });
                    const secureId = safeBtoa(payload);

                    return {
                        id: p.id,
                        title: p.title?.rendered || "Sem título",
                        date: p.date || new Date().toISOString(),
                        srcName: src.name,
                        srcSlug: src.slug,
                        img: p._embedded?.['wp:featuredmedia']?.[0]?.source_url || FALLBACK_IMG,
                        link: `artigo.html?feed=${secureId}`
                    };
                });

                // Junta os novos dados removendo duplicados
                allPosts = [...allPosts, ...newPosts].filter((v, i, a) => a.findIndex(t => t.link === v.link) === i);
                allPosts.sort((a, b) => new Date(b.date) - new Date(a.date));

                if (!isSavedView) {
                    renderFeedIncremental();
                }
            }
        } catch (e) {
            console.warn(`Falha na sincronização: ${src.name}`);
        } finally {
            isFetching = false;
        }
    });
}

function renderFeedIncremental() {
    const start = (currentPage - 1) * itemsPerPage;
    const end = start + itemsPerPage;
    const chunk = allPosts.slice(start, end);

    if (currentPage === 1 && displayedPosts.length === 0) {
        document.getElementById('feed').innerHTML = '';
    }

    if (chunk.length > 0) {
        displayedPosts = [...displayedPosts, ...chunk].filter((v, i, a) => a.findIndex(t => t.link === v.link) === i);
        renderHTML(displayedPosts);
    }
}

function renderHTML(list) {
    const feed = document.getElementById('feed');
    feed.innerHTML = list.map(p => `
        <a class="news-card" href="${p.link}">
            <img class="news-img" src="${p.img}" loading="lazy" onerror="this.src='${FALLBACK_IMG}'">
            <div class="news-body">
                <span class="news-tag">${p.srcName}</span>
                <h3 class="news-title">${p.title}</h3>
                <div class="news-meta"><span>${new Date(p.date).toLocaleDateString('pt-MZ')}</span></div>
            </div>
        </a>
    `).join('');
}

function filterCat(cat, btn) {
    document.querySelectorAll('.cat-item').forEach(i => i.classList.remove('active'));
    btn.classList.add('active');
    currentCat = cat;
    isSavedView = false;
    resetAndLoad();
}

function toggleSavedView() {
    isSavedView = !isSavedView;
    document.getElementById('bookmark-btn').classList.toggle('active', isSavedView);
    const anchor = document.getElementById('scroll-anchor');
    
    if (isSavedView) {
        anchor.style.display = 'none';
        const saved = JSON.parse(localStorage.getItem('cld_saved') || '[]');
        renderHTML(saved);
    } else {
        anchor.style.display = 'block';
        resetAndLoad();
    }
}

function resetAndLoad() { 
    allPosts = []; 
    displayedPosts = []; 
    currentPage = 1; 
    document.getElementById('feed').innerHTML = '';
    loadNews(); 
}

const observer = new IntersectionObserver(entries => {
    if (entries[0].isIntersecting && !isFetching && !isSavedView) {
        currentPage++;
        loadNews();
    }
}, { rootMargin: '200px' });

observer.observe(document.getElementById('scroll-anchor'));
window.onload = loadNews;
</script>
</body>
</html>
