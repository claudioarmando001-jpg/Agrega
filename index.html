<!DOCTYPE html>
<html lang="pt-MZ">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Só Notícias | Linha do Tempo</title>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root {
            --primary: #059669;
            --primary-gradient: linear-gradient(135deg, #059669 0%, #0d9488 100%);
            --bg: #fafafa;
            --card: #ffffff;
            --text: #0f172a;
            --text-meta: #64748b;
            --border: #f1f5f9;
            --radius-lg: 20px;
            --radius-md: 14px;
            --shadow-premium: 0 10px 30px -5px rgba(0, 0, 0, 0.05), 0 1px 3px 0 rgba(0, 0, 0, 0.02);
        }
        @media (prefers-color-scheme: dark) {
            :root {
                --bg: #0b0f19;
                --card: #151f32;
                --text: #f8fafc;
                --text-meta: #94a3b8;
                --border: #1e293b;
                --shadow-premium: 0 10px 30px -5px rgba(0, 0, 0, 0.3);
            }
        }
        * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
        body { font-family: 'Plus Jakarta Sans', sans-serif; background: var(--bg); color: var(--text); padding-bottom: 40px; }
        
        .navbar { position: sticky; top: 0; background: rgba(var(--bg), 0.80); backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px); z-index: 1000; padding: 18px 20px; border-bottom: 1px solid var(--border); }
        .nav-top { display: flex; justify-content: center; align-items: center; max-width: 1200px; margin: 0 auto; }
        .logo { font-weight: 800; font-size: 1.7rem; color: var(--text); text-decoration: none; letter-spacing: -1.5px; display: flex; align-items: center; gap: 6px; }
        .logo span { background: var(--primary-gradient); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
        
        .search-bar { margin: 20px auto 5px auto; max-width: 800px; position: relative; }
        .search-bar input { width: 100%; padding: 16px 18px 16px 52px; border-radius: var(--radius-md); border: 1px solid var(--border); background: var(--card); color: var(--text); font-family: inherit; box-shadow: var(--shadow-premium); outline: none; transition: 0.2s; font-size: 0.95rem; }
        .search-bar input:focus { border-color: var(--primary); box-shadow: 0 0 0 4px rgba(5, 150, 105, 0.15); }
        .search-bar i { position: absolute; left: 20px; top: 50%; transform: translateY(-50%); color: var(--text-meta); font-size: 1.1rem; }

        .feed { padding: 30px 20px; max-width: 1200px; margin: 0 auto; display: grid; grid-template-columns: repeat(auto-fill, minmax(320px, 1fr)); gap: 30px; }
        .news-card { display: flex; flex-direction: column; background: var(--card); border-radius: var(--radius-lg); border: 1px solid var(--border); text-decoration: none; color: inherit; overflow: hidden; transition: 0.3s cubic-bezier(0.4, 0, 0.2, 1); box-shadow: var(--shadow-premium); }
        .news-card:hover { transform: translateY(-6px); box-shadow: 0 20px 25px -5px rgba(0,0,0,0.1); border-color: rgba(5, 150, 105, 0.2); }
        .news-img-container { width: 100%; height: 210px; overflow: hidden; background: #eee; }
        .news-img { width: 100%; height: 100%; object-fit: cover; transition: transform 0.5s; }
        .news-card:hover .news-img { transform: scale(1.04); }
        .news-body { padding: 24px; flex-grow: 1; display: flex; flex-direction: column; }
        .news-tag { font-size: 0.7rem; font-weight: 800; color: var(--primary); text-transform: uppercase; margin-bottom: 12px; letter-spacing: 0.05em; }
        .news-title { font-size: 1.15rem; font-weight: 700; line-height: 1.45; margin-bottom: 15px; display: -webkit-box; -webkit-line-clamp: 3; -webkit-box-orient: vertical; overflow: hidden; color: var(--text); }
        .news-meta { font-size: 0.8rem; color: var(--text-meta); margin-top: auto; display: flex; align-items: center; gap: 6px; }

        .loader { text-align: center; padding: 50px; grid-column: 1/-1; color: var(--primary); font-size: 1.8rem; }
    </style>
</head>
<body>

<nav class="navbar">
    <div class="nav-top">
        <a href="index.html" class="logo">Só<span>Notícias</span></a>
    </div>
    <div class="search-bar">
        <i class="fas fa-search"></i>
        <input type="text" id="search-input" placeholder="Escreve para filtrar ou Enter para busca profunda..." oninput="localFilter()" onkeyup="if(event.key==='Enter') resetAndLoad()">
    </div>
</nav>

<main class="feed" id="feed"></main>
<div id="scroll-anchor" class="loader"><i class="fas fa-circle-notch fa-spin"></i></div>

<script>
const SOURCES = [
    { name: "O País", api: "https://opais.co.mz/wp-json/wp/v2/posts?_embed", slug: "opais" },
    { name: "Carta de MZ", api: "https://cartamz.com/wp-json/wp/v2/posts?_embed", slug: "carta" },
    { name: "MZ News", api: "https://mznews.co.mz/wp-json/wp/v2/posts?_embed", slug: "mznews" },
    { name: "Folha de Maputo", api: "https://www.folhademaputo.co.mz/wp-json/wp/v2/posts?_embed", slug: "folha" },
    { name: "Evidências", api: "https://evidencias.co.mz/wp-json/wp/v2/posts?_embed", slug: "evidencias" },
    { name: "Integrity", api: "https://integritymag.co.mz/wp-json/wp/v2/posts?_embed", slug: "integrity" },
    { name: "Mais de MZ", api: "https://mais.co.mz/wp-json/wp/v2/posts?_embed", slug: "mais" },
    { name: "LanceMZ", api: "https://lancemz.co.mz/wp-json/wp/v2/posts?_embed", slug: "lance" },
    { name: "Jornal Desafio", api: "https://jornaldesafio.co.mz/wp-json/wp/v2/posts?_embed", slug: "desafio" },
    { name: "A Bola África", api: "https://www.abola.pt/wp-json/wp/v2/posts?_embed", slug: "abola" },
    { name: "Portal Moz News", api: "https://portalmoznews.com/wp-json/wp/v2/posts?_embed", slug: "portalmoz" },
    { name: "SAPO.pt", api: "https://www.sapo.pt/wp-json/wp/v2/posts?_embed", slug: "sapo" }
];

let allPosts = [], currentPage = 1, isFetching = false;

function timeAgo(dateString) {
    const elapsed = new Date() - new Date(dateString);
    const mins = Math.round(elapsed / 60000);
    const hours = Math.round(mins / 60);
    if (mins < 1) return 'Agora mesmo';
    if (mins < 60) return `Há ${mins}min atrás`;
    if (hours < 24) return `Há ${hours}h atrás`;
    if (hours < 48) return 'Ontem';
    return new Date(dateString).toLocaleDateString('pt-MZ', { day: 'numeric', month: 'short' });
}

async function loadNews() {
    if (isFetching) return;
    isFetching = true;
    
    const searchVal = document.getElementById('search-input').value;

    const fetchPromises = SOURCES.map(async (src) => {
        try {
            let url = `${src.api}&per_page=4&page=${currentPage}`;
            if (searchVal) url += `&search=${encodeURIComponent(searchVal)}`;
            const res = await fetch(url);
            const data = await res.json();
            return data.map(p => ({
                id: p.id, title: p.title.rendered, date: p.date, 
                srcName: src.name, srcSlug: src.slug,
                img: p._embedded?.['wp:featuredmedia']?.[0]?.source_url || 'https://via.placeholder.com/400x250?text=So+Noticias',
                link: `artigo.html?id=${p.id}&src=${src.slug}`
            }));
        } catch (e) { return []; }
    });

    const results = await Promise.all(fetchPromises);
    const newPosts = results.flat().sort((a, b) => new Date(b.date) - new Date(a.date));
    allPosts = [...allPosts, ...newPosts];
    renderFeed(allPosts);
    isFetching = false;
    currentPage++;
}

function renderFeed(postsList) {
    const feed = document.getElementById('feed');
    if(currentPage === 1) feed.innerHTML = '';
    
    postsList.forEach(p => {
        const card = document.createElement('a');
        card.className = 'news-card';
        card.href = p.link;
        card.innerHTML = `
            <div class="news-img-container"><img class="news-img" src="${p.img}" loading="lazy"></div>
            <div class="news-body">
                <span class="news-tag">${p.srcName}</span>
                <h3 class="news-title">${p.title}</h3>
                <div class="news-meta"><i class="far fa-clock"></i> <span>${timeAgo(p.date)}</span></div>
            </div>`;
        feed.appendChild(card);
    });
}

function localFilter() {
    const val = document.getElementById('search-input').value.toLowerCase();
    if(!val) { renderFeed(allPosts); return; }
    const filtered = allPosts.filter(p => p.title.toLowerCase().includes(val) || p.srcName.toLowerCase().includes(val));
    renderFeed(filtered);
}

function resetAndLoad() { allPosts = []; currentPage = 1; loadNews(); }
const observer = new IntersectionObserver(e => e[0].isIntersecting && loadNews());
observer.observe(document.getElementById('scroll-anchor'));
window.onload = loadNews;
</script>
</body>
</html>
