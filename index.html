<!DOCTYPE html>
<html lang="pt-MZ">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Só Notícias - Feed</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

    <style>
        :root {
            --primary: #0f172a; --accent: #0284c7; --bg: #f1f5f9; --card: #ffffff;
            --text: #0f172a; --text-meta: #64748b; --border: #e2e8f0; --radius: 20px; 
            --sidebar-width: 280px;
        }
        body.dark-mode {
            --bg: #020617; --card: #1e293b; --text: #f8fafc; --text-meta: #94a3b8;
            --border: #334155; --accent: #38bdf8;
        }
        * { box-sizing: border-box; margin: 0; padding: 0; outline: none; -webkit-tap-highlight-color: transparent; }
        body { font-family: 'Plus Jakarta Sans', sans-serif; background: var(--bg); color: var(--text); padding-bottom: 70px; }
        
        .logo-main { font-weight: 800; font-size: 1.2rem; color: var(--accent); letter-spacing: -0.5px; cursor: pointer; display: flex; align-items: center; gap: 4px; text-decoration: none; }
        .logo-badge { font-size:0.55rem; border:1px solid var(--accent); padding:1px 3px; border-radius:4px; vertical-align: middle; }
        .header { position: sticky; top: 0; z-index: 1000; background: var(--card); border-bottom: 1px solid var(--border); padding: 10px 16px; }
        .header-top { display: flex; align-items: center; justify-content: space-between; max-width: 1200px; margin: 0 auto; }
        
        .sidebar { position: fixed; top: 0; left: calc(-1 * var(--sidebar-width)); width: var(--sidebar-width); height: 100%; background: var(--card); z-index: 6000; transition: 0.3s; border-right: 1px solid var(--border); padding: 20px; overflow-y: auto; }
        .sidebar.active { left: 0; }
        .sidebar-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.5); z-index: 5900; display: none; backdrop-filter: blur(2px); }
        .sidebar-overlay.active { display: block; }

        /* Categorias estilizadas do Só Notícias */
        .categories { display: flex; gap: 8px; overflow-x: auto; padding: 10px 0 2px 0; scrollbar-width: none; max-width: 1200px; margin: 0 auto; }
        .categories::-webkit-scrollbar { display: none; }
        .cat-item { padding: 6px 14px; background: var(--bg); border: 1px solid var(--border); border-radius: 100px; font-size: 0.75rem; font-weight: 700; color: var(--text-meta); white-space: nowrap; cursor: pointer; transition: 0.2s; }
        .cat-item.active { background: var(--accent); color: white; border-color: var(--accent); }

        .feed { padding: 15px; max-width: 1200px; margin: 0 auto; display: grid; grid-template-columns: 1fr; gap: 16px; }
        .news-item { background: var(--card); border-radius: var(--radius); padding: 12px; display: flex; gap: 15px; border: 1px solid var(--border); cursor: pointer; transition: transform 0.2s; text-decoration: none; color: inherit; position: relative; }
        .news-item:active { transform: scale(0.98); }
        .news-img { width: 110px; height: 110px; border-radius: 15px; object-fit: cover; background: #e2e8f0; }
        .news-info { flex: 1; display: flex; flex-direction: column; justify-content: space-between; }
        .news-title { font-size: 0.95rem; font-weight: 700; line-height: 1.4; display: -webkit-box; -webkit-line-clamp: 3; -webkit-box-orient: vertical; overflow: hidden; }
        .news-source { font-size: 0.65rem; font-weight: 800; padding: 4px 8px; border-radius: 6px; width: fit-content; color: white; text-transform: uppercase; }

        .bottom-nav { position: fixed; bottom: 0; left: 0; right: 0; background: var(--card); border-top: 1px solid var(--border); display: flex; justify-content: space-around; padding: 10px 0 25px 0; z-index: 2000; }
        .nav-item { display: flex; flex-direction: column; align-items: center; gap: 4px; color: var(--text-meta); cursor: pointer; font-size: 0.65rem; font-weight: 700; }
        .nav-item.active { color: var(--accent); }

        .loader-bar { position: fixed; top: 0; left: 0; height: 3px; background: var(--accent); z-index: 10000; transition: width 0.3s; width: 0; }
        .infinite-loader { text-align: center; padding: 20px 0; color: var(--text-meta); font-size: 0.85rem; font-weight: 600; display: none; }
        .infinite-loader.active { display: block; }

        .search-container { margin: 10px auto; max-width: 800px; position: relative; display: none; }
        .search-container.active { display: block; }
        .search-input { width: 100%; padding: 12px 40px; border-radius: 12px; border: 1px solid var(--border); background: var(--bg); color: var(--text); }
        .search-icon { position: absolute; left: 15px; top: 50%; transform: translateY(-50%); color: var(--text-meta); }
    </style>
</head>
<body>

<div class="loader-bar" id="loader-bar"></div>
<div class="sidebar-overlay" id="sidebar-overlay" onclick="toggleSidebar()"></div>

<aside class="sidebar" id="sidebar">
    <div style="font-weight:800; margin-bottom:20px; display:flex; justify-content:space-between">
        <div class="logo-main" onclick="window.location.reload()">SÓ NOTÍCIAS</div>
        <i class="fas fa-times" onclick="toggleSidebar()" style="cursor:pointer"></i>
    </div>
    <div style="color: var(--text-meta); font-size: 0.9rem;">O seu agregador central de notícias de Moçambique e do Mundo.</div>
</aside>

<header class="header">
    <div class="header-top">
        <div style="display:flex; align-items:center; gap:15px">
            <i class="fas fa-bars" onclick="toggleSidebar()" style="cursor:pointer"></i>
            <a href="index.html" class="logo-main">
                SÓ NOTÍCIAS <span class="logo-badge">LIVE</span>
            </a>
        </div>
        <div style="display:flex; gap:15px; align-items:center;">
            <i class="fas fa-search" onclick="toggleSearch()" style="cursor:pointer"></i>
            <i class="fas fa-moon" id="theme-icon" onclick="toggleTheme()" style="cursor:pointer"></i>
        </div>
    </div>
    <div class="search-container" id="search-box">
        <i class="fas fa-search search-icon"></i>
        <input type="text" class="search-input" id="search-input" placeholder="Pesquisar notícias..." onkeyup="if(event.key==='Enter') resetAndLoad()">
    </div>
    <div class="categories">
        <div class="cat-item active" onclick="filterCat('', this)">Recentíssimas</div>
        <div class="cat-item" onclick="filterCat('política', this)">Política</div>
        <div class="cat-item" onclick="filterCat('economia', this)">Economia</div>
        <div class="cat-item" onclick="filterCat('sociedade', this)">Sociedade</div>
        <div class="cat-item" onclick="filterCat('desporto', this)">Desporto</div>
    </div>
</header>

<main class="feed" id="feed"></main>
<div class="infinite-loader" id="infinite-loader"><i class="fas fa-spinner fa-spin"></i> Atualizando feed global...</div>

<nav class="bottom-nav">
    <div class="nav-item active" id="nav-home" onclick="resetAndLoad()"><i class="fas fa-home"></i>Início</div>
    <div class="nav-item" id="nav-saved" onclick="toggleSavedView()"><i class="fas fa-bookmark"></i>Salvos</div>
    <div class="nav-item" onclick="toggleSidebar()"><i class="fas fa-bars"></i>Menu</div>
</nav>

<script>
const FALLBACK_IMG = "https://blogger.googleusercontent.com/img/b/R29vZ2xl/AVvXsEj1PIdG6RZAkCnYz8E1wnpe11yJzX81_7GxL8akO2vFnl3Dl0aaSVYe5yRlaPIjec4amnPGW83xM5viMIADszhlsmelGtkPTsiYX4hsH40_Wede8FgCQcUSYP3Xagd22ziRSatOneaVAHqfp1WLWriLz140PMjF4Pxyw7MuyiD9-W0mn9N1wVwwjtT3bTlc/s1024/1766117715526_1.jpg";
const PROXY = "https://api.allorigins.win/get?url=";

const SOURCES = [
    { name: "O País", api: "https://opais.co.mz/wp-json/wp/v2/posts?_embed", slug: "opais", color: "#10b981" },
    { name: "Carta de MZ", api: "https://cartamz.com/wp-json/wp/v2/posts?_embed", slug: "carta", color: "#ea580c" },
    { name: "MZ News", api: "https://mznews.co.mz/wp-json/wp/v2/posts?_embed", slug: "mznews", color: "#0284c7" },
    { name: "Folha de Maputo", api: "https://www.folhademaputo.co.mz/wp-json/wp/v2/posts?_embed", slug: "folha", color: "#b91c1c" },
    { name: "Evidências", api: "https://evidencias.co.mz/wp-json/wp/v2/posts?_embed", slug: "evidencias", color: "#7c3aed" },
    { name: "Integrity", api: "https://integritymag.co.mz/wp-json/wp/v2/posts?_embed", slug: "integrity", color: "#ec4899" },
    { name: "Mais de MZ", api: "https://mais.co.mz/wp-json/wp/v2/posts?_embed", slug: "mais", color: "#0f172a" }
];

let allPosts = [], displayedPosts = [], currentPage = 1, itemsPerPage = 6;
let isFetching = false, currentCat = '', isSavedView = false;

window.onload = () => {
    if(localStorage.getItem('dark') === 'true') toggleTheme(true);
    loadNews();
    setupInfiniteScroll();
};

function toggleSidebar() {
    document.getElementById('sidebar').classList.toggle('active');
    document.getElementById('sidebar-overlay').classList.toggle('active');
}

function toggleTheme(init = false) {
    if(!init) document.body.classList.toggle('dark-mode');
    else document.body.classList.add('dark-mode');
    const isDark = document.body.classList.contains('dark-mode');
    localStorage.setItem('dark', isDark);
    document.getElementById('theme-icon').className = isDark ? 'fas fa-sun' : 'fas fa-moon';
}

function toggleSearch() {
    const box = document.getElementById('search-box');
    box.classList.toggle('active');
    if(box.classList.contains('active')) {
        document.getElementById('search-input').focus();
    } else {
        document.getElementById('search-input').value = "";
        resetAndLoad();
    }
}

function safeBtoa(str) {
    return btoa(encodeURIComponent(str).replace(/%([0-9A-F]{2})/g, (match, p1) => String.fromCharCode('0x' + p1)));
}

async function loadNews() {
    if (isFetching || isSavedView) return;
    isFetching = true;
    
    const bar = document.getElementById('loader-bar');
    bar.style.width = '40%';

    const searchVal = document.getElementById('search-input').value;
    const query = currentCat || searchVal;

    SOURCES.forEach(async (src) => {
        try {
            let baseUrl = `${src.api}&per_page=5&page=${currentPage}`;
            if (query) baseUrl += `&search=${encodeURIComponent(query)}`;

            const res = await fetch(PROXY + encodeURIComponent(baseUrl));
            if(res.ok) {
                const rawData = await res.json();
                const data = JSON.parse(rawData.contents);
                
                if(!Array.isArray(data)) return;

                const newPosts = data.map(p => {
                    const payload = JSON.stringify({ slug: src.slug, id: p.id });
                    const secureId = safeBtoa(payload);

                    return {
                        id: p.id,
                        title: p.title?.rendered || "Sem título",
                        date: p.date || new Date().toISOString(),
                        srcName: src.name,
                        srcSlug: src.slug,
                        color: src.color,
                        img: p._embedded?.['wp:featuredmedia']?.[0]?.source_url || FALLBACK_IMG,
                        link: `leitura.html?feed=${secureId}`
                    };
                });

                allPosts = [...allPosts, ...newPosts].filter((v, i, a) => a.findIndex(t => t.link === v.link) === i);
                allPosts.sort((a, b) => new Date(b.date) - new Date(a.date));

                if (!isSavedView) {
                    renderFeedIncremental();
                }
            }
        } catch (e) {
            console.warn(`Erro ao obter: ${src.name}`);
        } finally {
            isFetching = false;
            bar.style.width = '100%';
            setTimeout(() => bar.style.width = '0', 400);
        }
    });
}

function renderFeedIncremental() {
    const start = (currentPage - 1) * itemsPerPage;
    const end = start + itemsPerPage;
    const chunk = allPosts.slice(0, end);

    if(chunk.length > 0) {
        displayedPosts = chunk;
        renderHTML(displayedPosts);
    }
}

function renderHTML(list) {
    const feed = document.getElementById('feed');
    if (list.length === 0) {
        feed.innerHTML = `<p style="text-align:center; padding:40px; color:var(--text-meta);">Nenhuma notícia para exibir.</p>`;
        return;
    }
    feed.innerHTML = list.map(p => `
        <a class="news-item" href="${p.link}">
            <img src="${p.img}" class="news-img" onerror="this.src='${FALLBACK_IMG}'" loading="lazy">
            <div class="news-info">
                <span class="news-source" style="background:${p.color || '#0284c7'}">${p.srcName}</span>
                <div class="news-title">${p.title}</div>
                <div style="font-size:0.65rem; color:var(--text-meta)">${new Date(p.date).toLocaleDateString('pt-MZ')}</div>
            </div>
        </a>
    `).join('');
}

function filterCat(cat, btn) {
    document.querySelectorAll('.cat-item').forEach(i => i.classList.remove('active'));
    btn.classList.add('active');
    currentCat = cat;
    isSavedView = false;
    resetAndLoad();
}

function toggleSavedView() {
    isSavedView = !isSavedView;
    document.getElementById('nav-saved').classList.toggle('active', isSavedView);
    document.getElementById('nav-home').classList.toggle('active', !isSavedView);
    
    if (isSavedView) {
        const saved = JSON.parse(localStorage.getItem('cld_saved') || '[]');
        renderHTML(saved);
    } else {
        resetAndLoad();
    }
}

function resetAndLoad() { 
    allPosts = []; 
    displayedPosts = []; 
    currentPage = 1; 
    document.getElementById('feed').innerHTML = '';
    loadNews(); 
}

function setupInfiniteScroll() {
    window.onscroll = () => {
        if (isSavedView || isFetching) return;
        if ((window.innerHeight + window.scrollY) >= document.documentElement.scrollHeight - 300) {
            currentPage++;
            loadNews();
        }
    };
}
</script>
</body>
</html>
